# This is a notification workflow — the actual gap-check runs in Claude Code via /gap-check.
name: Gap Check on Deliverable Change

on:
  push:
    paths:
      - "deliverables/in-progress/**"

jobs:
  gap-check-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Identify changed deliverables
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD -- 'deliverables/in-progress/' | grep -v '\.gitkeep$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No deliverable content changed."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed deliverables:"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Gap check recommended for: $f"
          done <<< "$CHANGED"
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post summary
        if: steps.changed.outputs.files != ''
        run: |
          {
            echo "## Gap Check Recommended"
            echo ""
            echo "The following deliverables changed in this push:"
            echo ""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "- \`$f\`"
            done <<< "${{ steps.changed.outputs.files }}"
            echo ""
            echo "Run \`/gap-check <filename>\` in Claude Code on each before routing for review."
          } >> "$GITHUB_STEP_SUMMARY"
